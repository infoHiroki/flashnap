<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#4a90d9">
  <title>Flashnap</title>
  <link rel="manifest" href="manifest.json">
  <style>
    :root {
      --bg-primary: #ffffff;
      --bg-secondary: #f5f5f5;
      --bg-tertiary: #e8e8e8;
      --text-primary: #1a1a1a;
      --text-secondary: #666666;
      --accent: #4a90d9;
      --accent-hover: #3a7bc8;
      --danger: #e74c3c;
      --danger-hover: #c0392b;
      --success: #27ae60;
      --border: #ddd;
      --shadow: rgba(0, 0, 0, 0.1);
    }

    [data-theme="dark"] {
      --bg-primary: #1a1a2e;
      --bg-secondary: #16213e;
      --bg-tertiary: #0f3460;
      --text-primary: #eaeaea;
      --text-secondary: #b0b0b0;
      --border: #2a2a4a;
      --shadow: rgba(0, 0, 0, 0.3);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      min-height: 100dvh;
      overflow-x: hidden;
    }

    /* ヘッダー */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 16px;
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header h1 {
      font-size: 1.2rem;
      font-weight: 600;
    }

    .header-buttons {
      display: flex;
      gap: 8px;
    }

    /* ボタン共通 */
    .btn {
      padding: 8px 16px;
      border: none;
      border-radius: 8px;
      font-size: 0.9rem;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }

    .btn:active {
      transform: scale(0.98);
    }

    .btn-primary {
      background: var(--accent);
      color: white;
    }

    .btn-primary:hover {
      background: var(--accent-hover);
    }

    .btn-secondary {
      background: var(--bg-tertiary);
      color: var(--text-primary);
    }

    .btn-danger {
      background: var(--danger);
      color: white;
    }

    .btn-danger:hover {
      background: var(--danger-hover);
    }

    .btn-icon {
      padding: 8px;
      background: transparent;
      font-size: 1.2rem;
    }

    /* メインコンテンツ */
    .main {
      padding: 0;
    }

    /* 調査選択画面用 */
    #surveyScreen {
      padding: 16px;
      max-width: 600px;
      margin: 0 auto;
    }

    /* 調査選択画面 */
    .survey-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .survey-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px;
      background: var(--bg-secondary);
      border-radius: 12px;
      border: 1px solid var(--border);
      cursor: pointer;
      transition: background 0.2s;
    }

    .survey-item:hover {
      background: var(--bg-tertiary);
    }

    .survey-item.active {
      border-color: var(--accent);
      border-width: 2px;
    }

    .survey-info h3 {
      font-size: 1rem;
      margin-bottom: 4px;
    }

    .survey-info p {
      font-size: 0.8rem;
      color: var(--text-secondary);
    }

    .survey-actions {
      display: flex;
      gap: 4px;
    }

    /* 撮影画面: 3カラムレイアウト */
    #captureScreen {
      display: grid;
      grid-template-columns: 180px minmax(0, 1fr) 200px;
      grid-template-rows: 1fr;
      gap: 8px;
      height: calc(100dvh - 44px);
      align-items: start;
    }

    /* 左: ツリーサイドバー */
    .landscape-sidebar {
      grid-column: 1;
      grid-row: 1;
      display: flex;
      flex-direction: column;
      height: calc(100dvh - 44px);
      overflow-y: auto;
    }

    .landscape-tree {
      flex: 1;
      overflow-y: auto;
    }

    .tree-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 8px;
      font-size: 0.8rem;
      cursor: pointer;
      border-left: 3px solid transparent;
      transition: background 0.15s;
    }

    .tree-item:hover {
      background: var(--bg-tertiary);
    }

    .tree-item.selected {
      background: var(--bg-tertiary);
      border-left-color: var(--accent);
    }

    .tree-survey {
      font-weight: 600;
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border);
    }

    .tree-node {
      font-size: 0.75rem;
    }

    .tree-item-name {
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .tree-item-count {
      font-size: 0.7rem;
      color: var(--text-secondary);
      margin-left: 4px;
      flex-shrink: 0;
    }

    .btn-add-node-landscape {
      margin-top: 8px;
      padding: 6px 8px;
      font-size: 0.8rem;
      width: 100%;
    }

    /* 中央: 撮影セクション */
    .center-content {
      grid-column: 2;
      grid-row: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      height: 100%;
      overflow-y: auto;
      min-width: 0;
      padding: 8px 0;
    }

    .capture-section {
      padding: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .current-number {
      font-size: 4.5rem;
      font-weight: 700;
      color: var(--accent);
      margin-bottom: 4px;
    }

    .current-path {
      font-size: 0.8rem;
      color: var(--text-secondary);
      margin-bottom: 4px;
      word-break: break-all;
    }

    .current-count {
      font-size: 1.1rem;
      color: var(--text-secondary);
      margin-bottom: 4px;
    }

    /* 最近の撮影 */
    .recent-section {
      display: block;
      margin-top: 8px;
      width: 100%;
    }

    .recent-section h3 {
      font-size: 0.8rem;
      margin-bottom: 6px;
      text-align: center;
      color: var(--text-secondary);
    }

    .recent-list {
      display: flex;
      flex-wrap: nowrap;
      justify-content: flex-start;
      overflow-x: auto;
      gap: 8px;
    }

    .recent-item {
      flex-shrink: 0;
      width: 50px;
      height: 50px;
      border-radius: 8px;
      overflow: hidden;
      position: relative;
      cursor: pointer;
    }

    .recent-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .recent-item-name {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(0, 0, 0, 0.7);
      color: white;
      font-size: 0.55rem;
      padding: 2px 4px;
      text-align: center;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .recent-item .judgment-badge {
      width: 14px;
      height: 14px;
      font-size: 0.5rem;
    }

    /* 右: メタデータ + カメラサイドバー */
    .sidebar-right {
      grid-column: 3;
      grid-row: 1;
      display: flex;
      flex-direction: column;
      height: calc(100dvh - 44px);
      overflow-y: auto;
      padding: 4px;
      gap: 4px;
    }

    #metadataSidebarSlot {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
    }

    #metadataSidebarSlot .metadata-section {
      padding: 0;
    }

    .sidebar-right .camera-area {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      padding: 4px 0;
      flex-shrink: 0;
    }

    .sidebar-right .camera-area .btn-capture {
      width: 70px;
      height: 70px;
      font-size: 1.8rem;
      border-radius: 50%;
      background: var(--accent);
      color: white;
      border: none;
      cursor: pointer;
    }

    .sidebar-right .camera-area .btn-undo {
      font-size: 0.75rem;
      padding: 4px 8px;
    }

    .judgment-badge {
      position: absolute;
      top: 2px;
      left: 2px;
      width: 20px;
      height: 20px;
      border-radius: 4px;
      font-size: 0.65rem;
      font-weight: bold;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
    }
    .judgment-badge[data-val="A"] { background: #66DD66; color: #1a1a1a; }
    .judgment-badge[data-val="B"] { background: #66DDDD; color: #1a1a1a; }
    .judgment-badge[data-val="C"] { background: #DDDD66; color: #1a1a1a; }
    .judgment-badge[data-val="D"] { background: #DD66DD; color: #1a1a1a; }

    /* モーダル */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.5);
      z-index: 200;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .modal-overlay.active {
      display: flex;
    }

    .modal {
      background: var(--bg-primary);
      border-radius: 16px;
      width: 100%;
      max-width: 480px;
      max-height: 90vh;
      overflow: auto;
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px;
      border-bottom: 1px solid var(--border);
    }

    .modal-header h2 {
      font-size: 1.1rem;
    }

    .modal-body {
      padding: 16px;
    }

    .modal-footer {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
      padding: 16px;
      border-top: 1px solid var(--border);
    }

    /* フォーム */
    .form-group {
      margin-bottom: 16px;
    }

    .form-group label {
      display: block;
      margin-bottom: 6px;
      font-size: 0.9rem;
      font-weight: 500;
    }

    .form-group input,
    .form-group select {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 1rem;
      background: var(--bg-secondary);
      color: var(--text-primary);
    }

    .form-group input:focus,
    .form-group select:focus {
      outline: none;
      border-color: var(--accent);
    }

    .form-group input[type="checkbox"] {
      width: auto;
      margin-right: 8px;
    }

    .form-group label:has(input[type="checkbox"]) {
      display: flex;
      align-items: center;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    /* 設定 */
    .setting-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 0;
      border-bottom: 1px solid var(--border);
    }

    .setting-item:last-child {
      border-bottom: none;
    }

    .setting-label {
      font-weight: 500;
    }

    .setting-desc {
      font-size: 0.8rem;
      color: var(--text-secondary);
    }

    /* トグルスイッチ */
    .toggle {
      position: relative;
      width: 48px;
      height: 28px;
    }

    .toggle input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .toggle-slider {
      position: absolute;
      cursor: pointer;
      inset: 0;
      background: var(--bg-tertiary);
      border-radius: 28px;
      transition: 0.3s;
    }

    .toggle-slider:before {
      content: '';
      position: absolute;
      height: 22px;
      width: 22px;
      left: 3px;
      bottom: 3px;
      background: white;
      border-radius: 50%;
      transition: 0.3s;
    }

    .toggle input:checked + .toggle-slider {
      background: var(--accent);
    }

    .toggle input:checked + .toggle-slider:before {
      transform: translateX(20px);
    }

    /* エクスポート写真一覧 */
    .photo-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
      gap: 8px;
      margin-top: 16px;
    }

    .photo-item {
      position: relative;
      aspect-ratio: 1;
      border-radius: 8px;
      overflow: hidden;
    }

    .photo-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .photo-item-delete {
      position: absolute;
      top: 4px;
      right: 4px;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: var(--danger);
      color: white;
      border: none;
      cursor: pointer;
      font-size: 0.8rem;
    }

    .photo-item-name {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(0, 0, 0, 0.7);
      color: white;
      font-size: 0.6rem;
      padding: 4px;
      text-align: center;
    }

    /* 統計 */
    .stats {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      margin-bottom: 16px;
    }

    .stat-item {
      text-align: center;
      padding: 12px;
      background: var(--bg-secondary);
      border-radius: 8px;
    }

    .stat-value {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--accent);
    }

    .stat-label {
      font-size: 0.8rem;
      color: var(--text-secondary);
    }

    /* 空状態 */
    .empty-state {
      text-align: center;
      padding: 48px 16px;
      color: var(--text-secondary);
    }

    .empty-state-icon {
      font-size: 3rem;
      margin-bottom: 16px;
    }

    /* ユーティリティ */
    .hidden {
      display: none !important;
    }

    .text-center {
      text-align: center;
    }

    .mt-16 {
      margin-top: 16px;
    }

    .mb-16 {
      margin-bottom: 16px;
    }

    /* メタデータ入力セクション */
    .metadata-section {
      padding: 0 16px 16px;
    }

    .metadata-row {
      margin-bottom: 8px;
    }

    .metadata-row select {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--bg-primary);
      color: var(--text-primary);
      font-size: 0.9rem;
      appearance: auto;
    }

    .meta-tabs {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
    }

    .meta-tabs button {
      flex: 1;
      min-width: 60px;
      padding: 8px 4px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--bg-secondary);
      color: var(--text-primary);
      font-size: 0.8rem;
      cursor: pointer;
      transition: background 0.2s;
    }

    .meta-tabs button.active {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }

    .judgment-row {
      display: flex;
      gap: 6px;
    }

    .judgment-btn {
      flex: 1;
      padding: 10px 4px;
      border: 2px solid var(--border);
      border-radius: 8px;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.2s;
    }

    .judgment-btn[data-val="A"] { background: #CCFFCC; color: #1a1a1a; }
    .judgment-btn[data-val="B"] { background: #CCFFFF; color: #1a1a1a; }
    .judgment-btn[data-val="C"] { background: #FFFFCC; color: #1a1a1a; }
    .judgment-btn[data-val="D"] { background: #FFCCFF; color: #1a1a1a; }

    .judgment-btn.active[data-val="A"] { background: #66DD66; border-color: #33AA33; }
    .judgment-btn.active[data-val="B"] { background: #66DDDD; border-color: #33AAAA; }
    .judgment-btn.active[data-val="C"] { background: #DDDD66; border-color: #AAAA33; }
    .judgment-btn.active[data-val="D"] { background: #DD66DD; border-color: #AA33AA; }

    [data-theme="dark"] .judgment-btn[data-val="A"] { background: #2a5a2a; color: #eaeaea; }
    [data-theme="dark"] .judgment-btn[data-val="B"] { background: #2a5a5a; color: #eaeaea; }
    [data-theme="dark"] .judgment-btn[data-val="C"] { background: #5a5a2a; color: #eaeaea; }
    [data-theme="dark"] .judgment-btn[data-val="D"] { background: #5a2a5a; color: #eaeaea; }

    [data-theme="dark"] .judgment-btn.active[data-val="A"] { background: #44AA44; border-color: #66DD66; }
    [data-theme="dark"] .judgment-btn.active[data-val="B"] { background: #44AAAA; border-color: #66DDDD; }
    [data-theme="dark"] .judgment-btn.active[data-val="C"] { background: #AAAA44; border-color: #DDDD66; }
    [data-theme="dark"] .judgment-btn.active[data-val="D"] { background: #AA44AA; border-color: #DD66DD; }

    /* メタデータ編集モーダル */
    .meta-edit-photo {
      width: 100%;
      border-radius: 8px;
      max-height: 200px;
      object-fit: contain;
      background: var(--bg-secondary);
    }
    .meta-edit-filename {
      text-align: center;
      margin: 8px 0;
      font-size: 0.85rem;
      color: var(--text-secondary);
    }
    #metaEditModal .meta-tabs {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
    }
    #metaEditModal .meta-tabs button {
      flex: 1;
      min-width: 60px;
      padding: 8px 4px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--bg-secondary);
      color: var(--text-primary);
      font-size: 0.8rem;
      cursor: pointer;
    }
    #metaEditModal .meta-tabs button.active {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }
    #metaEditModal .metadata-row {
      margin-bottom: 8px;
    }
    #metaEditModal .metadata-row select {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--bg-primary);
      color: var(--text-primary);
      font-size: 0.9rem;
      appearance: auto;
    }
    #metaEditModal .judgment-row {
      display: flex;
      gap: 6px;
    }

    .metadata-section {
      padding: 0 4px 4px;
    }
    .metadata-row {
      margin-bottom: 3px;
    }
    .metadata-row select {
      padding: 4px 6px;
      font-size: 0.75rem;
    }
    .meta-tabs button {
      padding: 3px 2px;
      font-size: 0.7rem;
      min-width: auto;
    }
    .judgment-btn {
      padding: 4px 2px;
      font-size: 0.8rem;
    }
  </style>
</head>
<body>
  <!-- Google APIs for Drive integration -->
  <script src="https://apis.google.com/js/api.js" async defer></script>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <!-- ヘッダー -->
  <header class="header">
    <div style="display: flex; align-items: center; gap: 8px;">
      <button class="btn btn-icon hidden" id="btnBack" title="戻る">
        <span>←</span>
      </button>
      <h1 id="headerTitle" style="cursor: pointer;">Flashnap</h1>
    </div>
    <div class="header-buttons">
      <button class="btn btn-icon" id="btnExport" title="エクスポート">
        <span>📤</span>
      </button>
      <button class="btn btn-icon" id="btnSettings" title="設定">
        <span>⚙️</span>
      </button>
    </div>
  </header>

  <!-- メインコンテンツ -->
  <main class="main">
    <!-- 調査選択画面 -->
    <section id="surveyScreen">
      <div class="survey-list" id="surveyList"></div>
      <button class="btn btn-primary mt-16" id="btnNewSurvey" style="width: 100%;">
        + 新規調査を作成
      </button>
    </section>

    <!-- 撮影画面 -->
    <section id="captureScreen" class="hidden">
      <input type="file" id="fileInput" accept="image/*" capture="environment" style="display:none;">

      <!-- 左: ツリーサイドバー -->
      <div class="landscape-sidebar" id="landscapeSidebar">
        <div class="landscape-tree" id="landscapeTree"></div>
        <button class="btn btn-secondary btn-add-node-landscape" id="btnAddNodeLandscape">
          + 階層追加
        </button>
      </div>

      <!-- 中央: 撮影セクション + 最近の撮影 -->
      <div class="center-content">
        <div class="capture-section">
          <div class="current-number" id="currentNumber">001</div>
          <div class="current-path" id="currentPath">撮影場所を選択してください</div>
          <div class="current-count" id="currentCount">0枚撮影済み</div>
        </div>
        <div class="recent-section">
          <h3>最近の撮影</h3>
          <div class="recent-list" id="recentList"></div>
        </div>
      </div>

      <!-- 右: メタデータ + カメラ -->
      <div class="sidebar-right" id="sidebarRight">
        <div id="metadataSidebarSlot">
          <div id="metadataSection" class="metadata-section hidden">
            <div class="metadata-row">
              <div class="meta-tabs" id="categoryTabs"></div>
            </div>
            <div class="metadata-row">
              <select id="metaPart"><option value="">部位</option></select>
            </div>
            <div class="metadata-row">
              <select id="metaMaterial"><option value="">材質</option></select>
            </div>
            <div class="metadata-row">
              <select id="metaNote"><option value="">特記</option></select>
            </div>
            <div class="metadata-row judgment-row">
              <button type="button" class="judgment-btn" data-val="A">A</button>
              <button type="button" class="judgment-btn" data-val="B">B</button>
              <button type="button" class="judgment-btn" data-val="C">C</button>
              <button type="button" class="judgment-btn" data-val="D">D</button>
            </div>
          </div>
        </div>
        <div class="camera-area">

    // ============================================
    // IndexedDB
    // ============================================
    const DB_NAME = 'flashnap';
    const DB_VERSION = 2;
    let db = null;

    async function initDB() {
      return new Promise((resolve, reject) => {
        const request = indexedDB.open(DB_NAME, DB_VERSION);

        request.onerror = () => reject(request.error);
        request.onsuccess = () => {
          db = request.result;
          resolve(db);
        };

        request.onupgradeneeded = (event) => {
          const database = event.target.result;

          // 調査
          if (!database.objectStoreNames.contains('surveys')) {
            const surveys = database.createObjectStore('surveys', { keyPath: 'id' });
            surveys.createIndex('createdAt', 'createdAt');
          }

          // 階層ノード
          if (!database.objectStoreNames.contains('nodes')) {
            const nodes = database.createObjectStore('nodes', { keyPath: 'id' });
            nodes.createIndex('surveyId', 'surveyId');
            nodes.createIndex('parentId', 'parentId');
          }

          // 撮影記録
          if (!database.objectStoreNames.contains('records')) {
            const records = database.createObjectStore('records', { keyPath: 'id' });
            records.createIndex('surveyId', 'surveyId');
            records.createIndex('nodeId', 'nodeId');
          }

          // 写真バイナリ
          if (!database.objectStoreNames.contains('photos')) {
            database.createObjectStore('photos', { keyPath: 'id' });
          }

          // テンプレート
          if (!database.objectStoreNames.contains('templates')) {
            database.createObjectStore('templates', { keyPath: 'id' });
          }

          // 設定
          if (!database.objectStoreNames.contains('settings')) {
            database.createObjectStore('settings', { keyPath: 'key' });
          }

          // 同期キュー (v2で追加)
          if (!database.objectStoreNames.contains('syncQueue')) {
            const syncQueue = database.createObjectStore('syncQueue', { keyPath: 'id' });
            syncQueue.createIndex('status', 'status');
          }
        };
      });
    }

    // DB汎用操作
    function dbOperation(storeName, mode, operation) {
      return new Promise((resolve, reject) => {
        const transaction = db.transaction(storeName, mode);
        const store = transaction.objectStore(storeName);
        const request = operation(store);
        request.onsuccess = () => resolve(request.result);
        request.onerror = () => reject(request.error);
      });
    }

    async function dbGetAll(storeName) {
      return dbOperation(storeName, 'readonly', store => store.getAll());
    }

    async function dbGet(storeName, key) {
      return dbOperation(storeName, 'readonly', store => store.get(key));
    }

    async function dbPut(storeName, data) {
      return dbOperation(storeName, 'readwrite', store => store.put(data));
    }

    async function dbDelete(storeName, key) {
      return dbOperation(storeName, 'readwrite', store => store.delete(key));
    }

    async function dbGetByIndex(storeName, indexName, value) {
      return new Promise((resolve, reject) => {
        const transaction = db.transaction(storeName, 'readonly');
        const store = transaction.objectStore(storeName);
        const index = store.index(indexName);
        const request = index.getAll(value);
        request.onsuccess = () => resolve(request.result);
        request.onerror = () => reject(request.error);
      });
    }

    async function dbClear(storeName) {
      return dbOperation(storeName, 'readwrite', store => store.clear());
    }

    const GOOGLE_CLIENT_ID = '347827958454-f2uo1m6fehbcdeq90mkf9uajb0j47cvf.apps.googleusercontent.com';
    const GOOGLE_SCOPES = 'https://www.googleapis.com/auth/drive.file';
    let gapiInited = false;

    // ============================================
    // Google Drive 認証
    // ============================================
    function initGapi() {
      return new Promise((resolve) => {
        if (typeof gapi === 'undefined') {
          console.log('GAPI not loaded yet');
          resolve(false);
          return;
        }
        gapi.load('client', async () => {
          await gapi.client.init({});
          gapiInited = true;
          console.log('GAPI initialized');
          resolve(true);
        });
      });
    }

    function initGis() {
      return new Promise((resolve) => {
        if (typeof google === 'undefined' || !google.accounts) {
          console.log('GIS not loaded yet');
          resolve(false);
          return;
        }
        tokenClient = google.accounts.oauth2.initTokenClient({
          client_id: GOOGLE_CLIENT_ID,
          scope: GOOGLE_SCOPES,
          callback: (response) => {
            if (response.error) {
              console.error('Token error:', response);
              return;
            }
            // トークン取得成功
            state.settings.googleDrive.accessToken = response.access_token;
            state.settings.googleDrive.tokenExpiry = Date.now() + (response.expires_in * 1000);
            state.settings.googleDrive.enabled = true;
            saveGoogleDriveSettings();
            updateGoogleDriveUI();
            // 同期キュー処理開始
            processSyncQueue();
          }
        });
        gisInited = true;
        console.log('GIS initialized');
        resolve(true);
      });
    }

    async function connectGoogleDrive() {
      if (!gapiInited || !gisInited) {
        await initGapi();
        await initGis();
      }
      if (!gapiInited || !gisInited) {
        alert('Google APIの読み込みに失敗しました。ページを再読み込みしてください。');
        return;
      }
      if (GOOGLE_CLIENT_ID === 'YOUR_CLIENT_ID.apps.googleusercontent.com') {
        alert('Google Drive連携を使用するには、GOOGLE_CLIENT_IDを設定してください。');
        return;
      }
      tokenClient.requestAccessToken({ prompt: 'consent' });
    }

    async function disconnectGoogleDrive() {
      if (!confirm('Google Driveとの接続を解除しますか？')) return;

      if (state.settings.googleDrive.accessToken) {
        google.accounts.oauth2.revoke(state.settings.googleDrive.accessToken);
      }
      state.settings.googleDrive = {
        enabled: false,
        accessToken: null,
        tokenExpiry: null,
        folderId: null
      };
      await saveGoogleDriveSettings();
      updateGoogleDriveUI();
    }

    async function refreshTokenIfNeeded() {
      if (!state.settings.googleDrive.enabled) return false;
      // トークン有効期限の5分前にリフレッシュ
      if (state.settings.googleDrive.tokenExpiry &&
          Date.now() > state.settings.googleDrive.tokenExpiry - 300000) {
        return new Promise((resolve) => {
          tokenClient.requestAccessToken({ prompt: '' });
          // callbackで処理されるので、少し待つ
          setTimeout(() => resolve(true), 1000);
        });
      }
      return true;
    }

    async function saveGoogleDriveSettings() {
      await dbPut('settings', { key: 'googleDrive', ...state.settings.googleDrive });
    }

    function updateGoogleDriveUI() {
      const statusEl = $('googleDriveStatus');
      const connectBtn = $('btnConnectGoogleDrive');
      const disconnectBtn = $('btnDisconnectGoogleDrive');
      const syncBtn = $('btnSyncNow');

      if (state.settings.googleDrive.enabled) {
        statusEl.textContent = '接続中';
        statusEl.style.color = 'var(--success)';
        connectBtn.classList.add('hidden');
        disconnectBtn.classList.remove('hidden');
        syncBtn.classList.remove('hidden');
      } else {
        statusEl.textContent = '未接続';
        statusEl.style.color = 'var(--text-secondary)';
        connectBtn.classList.remove('hidden');
        disconnectBtn.classList.add('hidden');
        syncBtn.classList.add('hidden');
      }
      updateSyncQueueUI();
    }

    async function updateSyncQueueUI() {
      const queueStatusEl = $('syncQueueStatus');
      const queueCountEl = $('syncQueueCount');
      if (!state.settings.googleDrive.enabled) {
        queueStatusEl.classList.add('hidden');
        return;
      }
      const queue = await dbGetAll('syncQueue');
      if (queue.length > 0) {
        queueStatusEl.classList.remove('hidden');
        const pending = queue.filter(q => q.status === 'pending' || q.status === 'retry').length;
        const failed = queue.filter(q => q.status === 'failed').length;
        const uploading = queue.filter(q => q.status === 'uploading').length;
        let text = `${pending}件待機中`;
        if (uploading > 0) text += ` / ${uploading}件アップロード中`;
        if (failed > 0) text += ` / ${failed}件失敗`;
        queueCountEl.textContent = text;
      } else {
        queueStatusEl.classList.add('hidden');
      }
    }

    async function syncNowWithFeedback() {
      const queue = await dbGetAll('syncQueue');
      const pending = queue.filter(q => q.status === 'pending' || q.status === 'retry' || q.status === 'failed');
      if (pending.length === 0) {
        alert('同期するファイルがありません');
        return;
      }
      // 失敗したものをリトライ状態に戻す
      for (const item of queue.filter(q => q.status === 'failed')) {
        item.status = 'retry';
        item.retryCount = 0;
        await dbPut('syncQueue', item);
      }
      alert(`${pending.length}件の同期を開始します`);
      await processSyncQueue();
      await updateSyncQueueUI();
      const remaining = await dbGetAll('syncQueue');
      if (remaining.length === 0) {
        alert('同期完了！');
      } else {
        const failed = remaining.filter(q => q.status === 'failed');
        if (failed.length > 0) {
          const errorMsg = failed[0].lastError || '不明なエラー';
          alert(`${failed.length}件の同期に失敗\n\nエラー: ${errorMsg}`);
        }
      }
    }

    async function clearSyncQueue() {
      if (!confirm('同期キューをすべてクリアしますか？')) return;
      await dbClear('syncQueue');
      await updateSyncQueueUI();
      alert('同期キューをクリアしました');
    }

    // ============================================
    // Google Drive アップロード
    // ============================================
    async function ensureFlashnapFolder() {
      if (state.settings.googleDrive.folderId) {
        return state.settings.googleDrive.folderId;
      }

      await refreshTokenIfNeeded();
      const token = state.settings.googleDrive.accessToken;

      // Flashnapフォルダを検索
      const searchRes = await fetch(
        `https://www.googleapis.com/drive/v3/files?q=name='Flashnap' and mimeType='application/vnd.google-apps.folder' and trashed=false`,
        { headers: { 'Authorization': `Bearer ${token}` } }
      );
      const searchData = await searchRes.json();

      if (searchData.files && searchData.files.length > 0) {
        state.settings.googleDrive.folderId = searchData.files[0].id;
        await saveGoogleDriveSettings();
        return state.settings.googleDrive.folderId;
      }

      // フォルダ作成
      const createRes = await fetch('https://www.googleapis.com/drive/v3/files', {
        method: 'POST',
        headers: {
          'Authorization': `Bearer ${token}`,
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({
          name: 'Flashnap',
          mimeType: 'application/vnd.google-apps.folder'
        })
      });
      const folder = await createRes.json();
      state.settings.googleDrive.folderId = folder.id;
      await saveGoogleDriveSettings();
      return folder.id;
    }

    async function ensureSurveyFolder(surveyName, parentFolderId) {
      await refreshTokenIfNeeded();
      const token = state.settings.googleDrive.accessToken;

      // 調査フォルダを検索
      const searchRes = await fetch(
        `https://www.googleapis.com/drive/v3/files?q=name='${surveyName.replace(/'/g, "\\'")}' and '${parentFolderId}' in parents and mimeType='application/vnd.google-apps.folder' and trashed=false`,
        { headers: { 'Authorization': `Bearer ${token}` } }
      );
      const searchData = await searchRes.json();

      if (searchData.files && searchData.files.length > 0) {
        return searchData.files[0].id;
      }

      // フォルダ作成
      const createRes = await fetch('https://www.googleapis.com/drive/v3/files', {
        method: 'POST',
        headers: {
          'Authorization': `Bearer ${token}`,
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({
          name: surveyName,
          mimeType: 'application/vnd.google-apps.folder',
          parents: [parentFolderId]
        })
      });
      const folder = await createRes.json();
      return folder.id;
    }

    async function uploadToDrive(recordId, filename, surveyName) {
      await refreshTokenIfNeeded();
      const token = state.settings.googleDrive.accessToken;

      // 写真データ取得
      const photo = await dbGet('photos', recordId);
      if (!photo) throw new Error('Photo not found');

      // フォルダ確保
      const flashnapFolderId = await ensureFlashnapFolder();
      const surveyFolderId = await ensureSurveyFolder(surveyName, flashnapFolderId);

      // Base64データを取得
      const base64 = photo.dataUrl.split(',')[1];

      // multipart/related形式でリクエストを構築
      const boundary = 'flashnap_boundary_' + Date.now();
      const metadata = {
        name: filename,
        parents: [surveyFolderId]
      };

      const body =
        `--${boundary}\r\n` +
        `Content-Type: application/json; charset=UTF-8\r\n\r\n` +
        `${JSON.stringify(metadata)}\r\n` +
        `--${boundary}\r\n` +
        `Content-Type: image/jpeg\r\n` +
        `Content-Transfer-Encoding: base64\r\n\r\n` +
        `${base64}\r\n` +
        `--${boundary}--`;

      const uploadRes = await fetch(
        'https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart',
        {
          method: 'POST',
          headers: {
            'Authorization': `Bearer ${token}`,
            'Content-Type': `multipart/related; boundary=${boundary}`
          },
          body: body
        }
      );

      if (!uploadRes.ok) {
        const errorText = await uploadRes.text();
        throw new Error(`Upload failed: ${uploadRes.status} - ${errorText}`);
      }

      return await uploadRes.json();
    }

    async function addToSyncQueue(recordId, filename, surveyName) {
      const queueItem = {
        id: generateId(),
        recordId,
        filename,
        surveyName,
        status: 'pending',
        retryCount: 0,
        createdAt: Date.now()
      };
      await dbPut('syncQueue', queueItem);

      // オンラインなら即座に処理
      if (navigator.onLine && state.settings.googleDrive.enabled) {
        processSyncQueue();
      }
    }

    let isSyncing = false;

    async function processSyncQueue() {
      if (isSyncing) return;
      if (!state.settings.googleDrive.enabled) return;
      if (!navigator.onLine) return;

      isSyncing = true;

      try {
        const queue = await dbGetAll('syncQueue');
        const pending = queue.filter(item => item.status === 'pending' || item.status === 'retry');

        for (const item of pending) {
          try {
            // ステータス更新
            item.status = 'uploading';
            await dbPut('syncQueue', item);

            // アップロード
            await uploadToDrive(item.recordId, item.filename, item.surveyName);

            // 成功したらキューから削除
            await dbDelete('syncQueue', item.id);
            console.log(`Uploaded: ${item.filename}`);
          } catch (error) {
            console.error(`Upload failed: ${item.filename}`, error);
            item.retryCount++;
            item.lastError = error.message;
            if (item.retryCount >= 3) {
              item.status = 'failed';
            } else {
              item.status = 'retry';
            }
            await dbPut('syncQueue', item);
          }
        }
      } finally {
        isSyncing = false;
      }
    }

    // オンライン復帰時に同期
    window.addEventListener('online', () => {
      if (state.settings.googleDrive.enabled) {
        processSyncQueue();
      }
    });

    // ============================================
    // ヘルパー関数
    // ============================================
    function generateId() {
      return Date.now().toString(36) + Math.random().toString(36).substr(2);
    }

    function buildHierarchyTree(nodes, parentId = null) {
      return nodes
        .filter(n => n.parentId === parentId)
        .sort((a, b) => a.order - b.order)
        .map(node => ({
          ...node,
          children: buildHierarchyTree(nodes, node.id)
        }));
    }

    function buildBreadcrumbs(nodeId, nodesMap) {
      const crumbs = [];
      let current = nodesMap.get(nodeId);
      while (current) {
        crumbs.unshift(current);
        current = current.parentId ? nodesMap.get(current.parentId) : null;
      }
      return crumbs;
    }

    function getHierarchyNames(nodeId, nodesMap) {
      return buildBreadcrumbs(nodeId, nodesMap).map(n => n.name);
    }

    function formatNumber(num, settings) {
      const s = settings || state.settings;
      const result = num.toString().padStart(s.digits, '0');
      return (s.prefix || '') + result;
    }

    function getNextNumber(nodeId) {
      const records = state.records.filter(r =>
        r.surveyId === state.currentSurveyId && r.nodeId === nodeId
      );
      if (records.length === 0) {
        return 1;
      }
      return Math.max(...records.map(r => r.number)) + 1;
    }

    function getSurveySettings() {
      const survey = state.surveys.find(s => s.id === state.currentSurveyId);
      const defaults = state.settings;
      if (!survey || !survey.settings) return { ...defaults, separator: '-' };
      return {
        digits: survey.settings.digits ?? defaults.digits,
        prefix: survey.settings.prefix ?? defaults.prefix,
        separator: '-'
      };
    }

    function getNodesMap() {
      return new Map(state.nodes.map(n => [n.id, n]));
    }

    // ツリー表示（調査一覧 + 階層）
    function renderLandscapeTree() {
      const container = $('landscapeTree');
      let html = '';

      // 調査一覧
      state.surveys.sort((a, b) => b.createdAt - a.createdAt).forEach(survey => {
        const isCurrentSurvey = survey.id === state.currentSurveyId;
        const isRootSelected = isCurrentSurvey && state.currentNodeId === null;
        const photoCount = state.records.filter(r => r.surveyId === survey.id).length;

        html += `
          <div class="tree-item tree-survey ${isRootSelected ? 'selected' : ''} ${isCurrentSurvey ? 'current' : ''}" data-survey-id="${survey.id}">
            <span class="tree-item-name">📋 ${escapeHtml(survey.name)}</span>
            <span class="tree-item-count">${photoCount}</span>
          </div>
        `;

        // 現在の調査の場合、階層を表示
        if (isCurrentSurvey) {
          const surveyNodes = state.nodes.filter(n => n.surveyId === survey.id);

          // ツリー構造を再帰的に描画
          function renderNode(node, depth) {
            const photoCount = state.records.filter(r => r.nodeId === node.id).length;
            const isSelected = node.id === state.currentNodeId;
            const indent = depth * 10 + 16;

            let nodeHtml = `
              <div class="tree-item tree-node ${isSelected ? 'selected' : ''}" data-node-id="${node.id}" style="padding-left: ${indent}px;">
                <span class="tree-item-name">📁 ${escapeHtml(node.name)}</span>
                <span class="tree-item-count">${photoCount}</span>
              </div>
            `;

            const children = surveyNodes.filter(n => n.parentId === node.id).sort((a, b) => a.order - b.order);
            children.forEach(child => {
              nodeHtml += renderNode(child, depth + 1);
            });

            return nodeHtml;
          }

          const rootNodes = surveyNodes.filter(n => n.parentId === null).sort((a, b) => a.order - b.order);
          rootNodes.forEach(node => {
            html += renderNode(node, 1);
          });
        }
      });

      container.innerHTML = html || '<p style="color: var(--text-secondary); font-size: 0.8rem; padding: 8px;">調査がありません</p>';

      // 調査クリックイベント（タップでルート階層を選択）
      container.querySelectorAll('.tree-survey').forEach(item => {
        item.addEventListener('click', () => {
          const surveyId = item.dataset.surveyId;
          if (surveyId !== state.currentSurveyId) {
            selectSurvey(surveyId);
          } else {
            // 現在の調査をタップ → ルート階層を選択
            state.currentNodeId = null;
            state.lastRecordId = null;
            renderLandscapeTree();
            renderCaptureSection();
          }
        });
      });

      // 階層クリックイベント
      container.querySelectorAll('.tree-node').forEach(item => {
        item.addEventListener('click', () => {
          selectNodeForCapture(item.dataset.nodeId);
        });
      });
    }

    // 横持ち時：階層を選択して撮影対象に設定
    function selectNodeForCapture(nodeId) {
      state.currentNodeId = nodeId;
      state.lastRecordId = null;
      renderLandscapeTree();
      renderCaptureSection();
    }

    function renderCaptureSection() {
      const nodesMap = getNodesMap();
      const settings = getSurveySettings();
      const survey = state.surveys.find(s => s.id === state.currentSurveyId);

      // 現在の番号
      const nextNum = getNextNumber(state.currentNodeId);
      $('currentNumber').textContent = formatNumber(nextNum, settings);

      // パス表示
      if (state.currentNodeId) {
        const names = getHierarchyNames(state.currentNodeId, nodesMap);
        $('currentPath').textContent = names.join(settings.separator);
      } else {
        $('currentPath').textContent = survey?.name || '調査';
      }

      // 現在の階層の撮影枚数
      const count = state.records.filter(r =>
        r.surveyId === state.currentSurveyId && r.nodeId === state.currentNodeId
      ).length;
      $('currentCount').textContent = `${count}枚撮影済み`;

      // 取り消しボタン
      $('btnUndoSidebar').classList.toggle('hidden', !state.lastRecordId);

      // メタデータセクション表示制御
      if (survey?.type && SURVEY_TYPES[survey.type]) {
        $('metadataSection').classList.remove('hidden');
        renderMetadataForm(survey.type);
      } else {
        $('metadataSection').classList.add('hidden');
      }
    }

    async function renderRecentList() {
      const container = $('recentList');
      const survey = state.surveys.find(s => s.id === state.currentSurveyId);
      const hasMetadata = survey?.type && SURVEY_TYPES[survey.type];
      const surveyRecords = state.records
        .filter(r => r.surveyId === state.currentSurveyId)
        .sort((a, b) => b.createdAt - a.createdAt)
        .slice(0, 10);

      if (surveyRecords.length === 0) {
        container.innerHTML = '<p style="color: var(--text-secondary);">まだ撮影がありません</p>';
        return;
      }

      container.innerHTML = '';
      for (const record of surveyRecords) {
        const photo = await dbGet('photos', record.id);
        if (!photo) continue;

        const div = document.createElement('div');
        div.className = 'recent-item';
        const judgment = record.metadata?.judgment;
        const badgeHtml = judgment
          ? `<div class="judgment-badge" data-val="${escapeHtml(judgment)}">${escapeHtml(judgment)}</div>`
          : '';
        div.innerHTML = `
          <img src="${photo.dataUrl}" alt="${record.filename}">
          ${badgeHtml}
          <div class="recent-item-name">${escapeHtml(record.filename)}</div>
        `;
        if (hasMetadata) {
          div.addEventListener('click', () => openMetaEditModal(record.id));
        }
        container.appendChild(div);
      }
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // ============================================
    // 調査操作
    // ============================================
    async function selectSurvey(surveyId) {
      state.currentSurveyId = surveyId;
      state.currentNodeId = null;
      state.lastRecordId = null;
      _metadataInitialized = false;

      // ヘッダーはFlashnapのまま、戻るボタンも非表示（パンくずで戻れる）

      showScreen('capture');
      renderLandscapeTree();
      renderCaptureSection();
      renderRecentList();
    }

    function openSurveyModal(surveyId = null) {
      const modal = $('surveyModal');
      const isEdit = !!surveyId;

      $('surveyModalTitle').textContent = isEdit ? '調査を編集' : '新規調査';

      if (isEdit) {
        const survey = state.surveys.find(s => s.id === surveyId);
        $('surveyName').value = survey.name;
        $('surveyType').value = survey.type || '';
        if (survey.settings) {
          $('surveyDigits').value = survey.settings.digits || '';
          $('surveyPrefix').value = survey.settings.prefix || '';
        }
      } else {
        $('surveyName').value = '';
        $('surveyType').value = '';
        $('surveyDigits').value = '';
        $('surveyPrefix').value = '';
      }

      modal.dataset.editId = surveyId || '';
      modal.classList.add('active');
    }

    async function saveSurvey() {
      const modal = $('surveyModal');
      const editId = modal.dataset.editId;
      const name = $('surveyName').value.trim();

      if (!name) {
        alert('調査名を入力してください');
        return;
      }

      const settings = {};
      if ($('surveyDigits').value) settings.digits = parseInt($('surveyDigits').value);
      if ($('surveyPrefix').value) settings.prefix = $('surveyPrefix').value;

      const surveyType = $('surveyType').value || null;

      if (editId) {
        // 編集
        const survey = state.surveys.find(s => s.id === editId);
        survey.name = name;
        survey.type = surveyType;
        survey.settings = Object.keys(settings).length > 0 ? settings : null;
        await dbPut('surveys', survey);
      } else {
        // 新規作成
        const survey = {
          id: generateId(),
          name,
          type: surveyType,
          settings: Object.keys(settings).length > 0 ? settings : null,
          createdAt: Date.now()
        };
        await dbPut('surveys', survey);
        state.surveys.push(survey);
      }

      modal.classList.remove('active');
      renderSurveyList();
    }

    async function deleteSurvey(surveyId) {
      if (!confirm('この調査を削除しますか？\n関連する全ての写真と階層も削除されます。')) return;

      // 関連データ削除
      const records = state.records.filter(r => r.surveyId === surveyId);
      for (const record of records) {
        await dbDelete('photos', record.id);
        await dbDelete('records', record.id);
      }
      state.records = state.records.filter(r => r.surveyId !== surveyId);

      const nodes = state.nodes.filter(n => n.surveyId === surveyId);
      for (const node of nodes) {
        await dbDelete('nodes', node.id);
      }
      state.nodes = state.nodes.filter(n => n.surveyId !== surveyId);

      await dbDelete('surveys', surveyId);
      state.surveys = state.surveys.filter(s => s.id !== surveyId);

      if (state.currentSurveyId === surveyId) {
        state.currentSurveyId = null;
        state.currentNodeId = null;
      }

      renderSurveyList();
    }

    // ============================================
    // 階層操作
    // ============================================
    function navigateToNode(nodeId) {
      state.currentNodeId = nodeId;
      state.lastRecordId = null;
      renderLandscapeTree();
      renderCaptureSection();
    }

    function openNodeModal(nodeId = null) {
      const modal = $('nodeModal');

      $('nodeModalTitle').textContent = isEdit ? '階層を編集' : '階層を追加';

    async function saveNode() {
      const modal = $('nodeModal');
      const editId = modal.dataset.editId;
      const name = $('nodeName').value.trim();

      if (!name) {
        alert('階層名を入力してください');
        return;
      }

      if (editId) {
        // 編集
        const node = state.nodes.find(n => n.id === editId);
        node.name = name;
        await dbPut('nodes', node);
      } else {
        // 新規作成
        const siblings = state.nodes.filter(n =>
          n.surveyId === state.currentSurveyId && n.parentId === state.currentNodeId
        );
        const node = {
          id: generateId(),
          surveyId: state.currentSurveyId,
          parentId: state.currentNodeId,
          name,
          order: siblings.length,
          createdAt: Date.now()
        };
        await dbPut('nodes', node);
        state.nodes.push(node);
      }

      modal.classList.remove('active');
      renderLandscapeTree();
    }

    async function deleteNode(nodeId) {
      if (!confirm('この階層を削除しますか？\n子階層と写真も削除されます。')) return;

      // 再帰的に子ノードを取得
      const getDescendants = (id) => {
        const children = state.nodes.filter(n => n.parentId === id);
        return [id, ...children.flatMap(c => getDescendants(c.id))];
      };

      const nodeIds = getDescendants(nodeId);

      // 関連写真削除
      for (const nid of nodeIds) {
        const records = state.records.filter(r => r.nodeId === nid);
        for (const record of records) {
          await dbDelete('photos', record.id);
          await dbDelete('records', record.id);
        }
        state.records = state.records.filter(r => r.nodeId !== nid);
      }

      // ノード削除
      for (const nid of nodeIds) {
        await dbDelete('nodes', nid);
      }
      state.nodes = state.nodes.filter(n => !nodeIds.includes(n.id));

      if (state.currentNodeId === nodeId) {
        const node = state.nodes.find(n => n.id === nodeId);
        state.currentNodeId = node?.parentId || null;
      }

      renderLandscapeTree();
      renderCaptureSection();
    }

    // 4:3クロップ処理
    function cropTo4by3(dataUrl) {
      return new Promise((resolve) => {
        const img = new Image();
        img.onload = () => {
          const srcW = img.width;
          const srcH = img.height;
          const targetRatio = 4 / 3;
          const srcRatio = srcW / srcH;
          console.log(`元画像: ${srcW}x${srcH} (比率: ${srcRatio.toFixed(3)}, 4:3=${targetRatio.toFixed(3)})`);

          let cropW, cropH, cropX, cropY;

          if (srcRatio > targetRatio) {
            // 横長すぎる → 左右をカット
            cropH = srcH;
            cropW = Math.round(srcH * targetRatio);
            cropX = Math.round((srcW - cropW) / 2);
            cropY = 0;
          } else {
            // 縦長すぎる → 上下をカット
            cropW = srcW;
            cropH = Math.round(srcW / targetRatio);
            cropX = 0;
            cropY = Math.round((srcH - cropH) / 2);
          }

          console.log(`クロップ後: ${cropW}x${cropH} (切り取り位置: x=${cropX}, y=${cropY})`);

          const canvas = document.createElement('canvas');
          canvas.width = cropW;
          canvas.height = cropH;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, cropX, cropY, cropW, cropH, 0, 0, cropW, cropH);

          resolve(canvas.toDataURL('image/jpeg', 0.92));
        };
        img.src = dataUrl;
      });
    }

    async function handleCapture(file) {
      const nodesMap = getNodesMap();
      const settings = getSurveySettings();
      const survey = state.surveys.find(s => s.id === state.currentSurveyId);
      const nextNum = getNextNumber(state.currentNodeId);

      // ファイル名生成
      let filename;
      if (state.currentNodeId) {
        const names = getHierarchyNames(state.currentNodeId, nodesMap);
        filename = names.join(settings.separator) + settings.separator + formatNumber(nextNum, settings) + '.jpg';
      } else {
        filename = (survey?.name || '調査') + settings.separator + formatNumber(nextNum, settings) + '.jpg';
      }

      // 画像をDataURLに変換
      const rawDataUrl = await new Promise((resolve) => {
        const reader = new FileReader();
        reader.onload = (e) => resolve(e.target.result);
        reader.readAsDataURL(file);
      });

      // 4:3にクロップ
      const dataUrl = await cropTo4by3(rawDataUrl);

      // メタデータ取得
      const metadata = getMetadataFromForm();

      // 記録保存
      const record = {
        id: generateId(),
        surveyId: state.currentSurveyId,
        nodeId: state.currentNodeId,
        number: nextNum,
        filename,
        metadata,
        createdAt: Date.now()
      };
      await dbPut('records', record);
      state.records.push(record);

      // 前回値キャリーフォワード
      if (metadata) {
        state.lastMetadata = metadata;
      }

      // 写真保存
      await dbPut('photos', { id: record.id, dataUrl });

      // Google Driveにアップロード（有効な場合）
      if (state.settings.googleDrive.enabled) {
        const surveyName = survey?.name || '調査';
        await addToSyncQueue(record.id, filename, surveyName);
      }

      // デバイスにダウンロード（有効な場合）
      if (state.settings.downloadToDevice) {
        downloadPhoto(dataUrl, filename);
      }

      state.lastRecordId = record.id;
      renderLandscapeTree();
      renderCaptureSection();
      renderRecentList();
    }

    // Downloadsフォルダにも保存
    async function downloadPhoto(dataUrl, filename) {
      // Data URLをBlobに変換
      const arr = dataUrl.split(',');
      const mime = arr[0].match(/:(.*?);/)[1];
      const bstr = atob(arr[1]);
      let n = bstr.length;
      const u8arr = new Uint8Array(n);
      while (n--) {
        u8arr[n] = bstr.charCodeAt(n);
      }
      const blob = new Blob([u8arr], { type: mime });

      // iOSの場合はWeb Share APIを使用（<a download>が動作しないため）
      const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
      if (isIOS && navigator.canShare) {
        const file = new File([blob], filename, { type: mime });
        if (navigator.canShare({ files: [file] })) {
          try {
            await navigator.share({ files: [file] });
            return;
          } catch (e) {
            // ユーザーがキャンセルした場合は何もしない
            if (e.name === 'AbortError') return;
          }
        }
      }

      // 通常のダウンロード（非iOS）
      const blobUrl = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = blobUrl;
      a.download = filename;
      a.click();
      setTimeout(() => URL.revokeObjectURL(blobUrl), 1000);
    }

    async function downloadZip() {
      const survey = state.surveys.find(s => s.id === state.currentSurveyId);
      const records = state.records.filter(r => r.surveyId === state.currentSurveyId);

      if (records.length === 0) {
        alert('エクスポートする写真がありません');
        return;
      }

      const zip = new JSZip();
      const nodesMap = getNodesMap();
      const settings = getSurveySettings();

      for (const record of records) {
        const photo = await dbGet('photos', record.id);
        if (!photo) continue;

        // フォルダパス生成
        const names = getHierarchyNames(record.nodeId, nodesMap);
        const folderPath = names.join('/');
        const base64 = photo.dataUrl.split(',')[1];

        // 判定ありの場合はサブフォルダに振り分け
        const judgment = record.metadata?.judgment;
        const filePath = judgment
          ? `${folderPath}/${judgment}/${record.filename}`
          : `${folderPath}/${record.filename}`;
        zip.file(filePath, base64, { base64: true });
      }

      // metadata.csv 生成（type付き調査の場合）
      if (survey?.type && SURVEY_TYPES[survey.type]) {
        const csvRows = ['\uFEFFファイル名,カテゴリ,部位,材質,特記,判定'];
        for (const record of records) {
          const m = record.metadata;
          if (m) {
            const escapeCsv = (v) => (v || '').replace(/"/g, '""');
            csvRows.push(`"${escapeCsv(record.filename)}","${escapeCsv(m.category)}","${escapeCsv(m.part)}","${escapeCsv(m.material)}","${escapeCsv(m.note)}","${escapeCsv(m.judgment)}"`);
          }
        }
        if (csvRows.length > 1) {
          zip.file('metadata.csv', csvRows.join('\r\n'));
        }
      }

      const content = await zip.generateAsync({ type: 'blob' });
      const date = new Date().toISOString().split('T')[0];
      const filename = `${survey.name}_${date}.zip`;

      const a = document.createElement('a');
      a.href = URL.createObjectURL(content);
      a.download = filename;
      a.click();
      URL.revokeObjectURL(a.href);

      $('exportModal').classList.remove('active');
    }

    let _metadataInitialized = false;

    function renderMetadataForm(type) {
      const master = SURVEY_TYPES[type]?.master;
      if (!master) return;

      const tabsEl = $('categoryTabs');
      const cats = Object.keys(master.parts);

      // 初回のみタブ生成
      if (!_metadataInitialized) {
        tabsEl.innerHTML = '';
        cats.forEach((cat, i) => {
          const btn = document.createElement('button');
          btn.textContent = cat;
          btn.dataset.cat = cat;
          if (i === 0) btn.classList.add('active');
          btn.addEventListener('click', () => onCategoryChange(type, cat));
          tabsEl.appendChild(btn);
        });

        $('metaPart').addEventListener('change', () => onPartChange(type));

        $('metadataSection').querySelectorAll('.judgment-btn').forEach(btn => {
          btn.addEventListener('click', () => {
            const wasActive = btn.classList.contains('active');
            $('metadataSection').querySelectorAll('.judgment-btn').forEach(b => b.classList.remove('active'));
            if (!wasActive) btn.classList.add('active');
          });
        });

        _metadataInitialized = true;

        // 前回値復元 or デフォルト
        if (state.lastMetadata?.category && cats.includes(state.lastMetadata.category)) {
          onCategoryChange(type, state.lastMetadata.category);
          restoreLastMetadata(type);
        } else {
          onCategoryChange(type, cats[0]);
        }
      }
    }

    function onCategoryChange(type, cat) {
      const master = SURVEY_TYPES[type].master;
      const tabsEl = $('categoryTabs');

      // タブ切替
      Array.from(tabsEl.children).forEach(btn => {
        btn.classList.toggle('active', btn.dataset.cat === cat);
      });

      // 部位リスト更新
      const partEl = $('metaPart');
      const parts = master.parts[cat] || [];
      partEl.innerHTML = '<option value="">部位</option>';
      parts.forEach(p => {
        const opt = document.createElement('option');
        opt.value = p;
        opt.textContent = p;
        partEl.appendChild(opt);
      });

      // 材質・特記をリセット（カテゴリのみでフィルタ）
      updateMaterialOptions(type, cat, '');
      updateNoteOptions(type, cat, '');
    }

    function onPartChange(type) {
      const cat = getCurrentCategory();
      const part = $('metaPart').value;
      updateMaterialOptions(type, cat, part);
      updateNoteOptions(type, cat, part);
    }

    function getCurrentCategory() {
      const active = document.querySelector('#categoryTabs button.active');
      return active?.dataset.cat || '';
    }

    function updateMaterialOptions(type, cat, part) {
      const master = SURVEY_TYPES[type].master;
      const el = $('metaMaterial');
      const prev = el.value;

      const filtered = master.materials.filter(m =>
        m.cat === cat && (!part || m.parts.includes(part))
      );

      el.innerHTML = '<option value="">材質</option>';
      const seen = new Set();
      filtered.forEach(m => {
        if (!seen.has(m.val)) {
          seen.add(m.val);
          const opt = document.createElement('option');
          opt.value = m.val;
          opt.textContent = m.val;
          el.appendChild(opt);
        }
      });

      // 前の値が残っていれば復元
      if (prev && seen.has(prev)) el.value = prev;
    }

    function updateNoteOptions(type, cat, part) {
      const master = SURVEY_TYPES[type].master;
      const el = $('metaNote');
      const prev = el.value;

      const filtered = master.notes.filter(n =>
        n.cat === cat && (!part || n.parts.includes(part))
      );

      el.innerHTML = '<option value="">特記</option>';
      const seen = new Set();
      filtered.forEach(n => {
        if (!seen.has(n.val)) {
          seen.add(n.val);
          const opt = document.createElement('option');
          opt.value = n.val;
          opt.textContent = n.val;
          el.appendChild(opt);
        }
      });

      if (prev && seen.has(prev)) el.value = prev;
    }

    function getMetadataFromForm() {
      const survey = state.surveys.find(s => s.id === state.currentSurveyId);
      if (!survey?.type || !SURVEY_TYPES[survey.type]) return null;

      return {
        category: getCurrentCategory(),

        material: $('metaMaterial').value,

      const m = state.lastMetadata;
      if (!m) return;

      if (m.part) {

      if (m.material) $('metaMaterial').value = m.material;

      document.querySelectorAll('.judgment-btn').forEach(b => b.classList.remove('active'));

      state.nodes = await dbGetAll('nodes');
      state.records = await dbGetAll('records');

      const savedSettings = await dbGet('settings', 'app');
      if (savedSettings) {
        state.settings = { ...state.settings, ...savedSettings };
      }

      // Google Drive設定を読み込み
      const savedGoogleDrive = await dbGet('settings', 'googleDrive');
      if (savedGoogleDrive) {
        state.settings.googleDrive = { ...state.settings.googleDrive, ...savedGoogleDrive };
      }

      // downloadToDevice設定を読み込み
      const savedDownload = await dbGet('settings', 'downloadToDevice');
      if (savedDownload) {
        state.settings.downloadToDevice = savedDownload.value;
      }

      applyTheme();
      showScreen('survey');
      renderSurveyList();

      // Service Worker登録
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js');
      }

      // Google API初期化（遅延）
      setTimeout(async () => {
        await initGapi();
        await initGis();
        // 接続済みの場合は同期キューを処理
        if (state.settings.googleDrive.enabled && navigator.onLine) {
          processSyncQueue();
        }
      }, 1000);

      // イベントリスナー設定
      setupEventListeners();
    }

    function setupEventListeners() {
      // ヘッダーボタン
      $('btnBack').addEventListener('click', () => {
        state.currentSurveyId = null;
        state.currentNodeId = null;
        $('headerTitle').textContent = 'Flashnap';
        $('btnBack').classList.add('hidden');
        showScreen('survey');
        renderSurveyList();
      });
      $('btnExport').addEventListener('click', () => {
        if (!state.currentSurveyId) {
          alert('調査を選択してください');
          return;
        }
        openExportModal();
      });
      $('btnSettings').addEventListener('click', openSettingsModal);
      $('headerTitle').addEventListener('click', () => {
        state.currentSurveyId = null;
        state.currentNodeId = null;
        showScreen('survey');
        renderSurveyList();
      });

      // 調査モーダル
      $('btnNewSurvey').addEventListener('click', () => openSurveyModal());
      $('btnCloseSurveyModal').addEventListener('click', () => $('surveyModal').classList.remove('active'));
      $('btnCancelSurvey').addEventListener('click', () => $('surveyModal').classList.remove('active'));
      $('btnSaveSurvey').addEventListener('click', saveSurvey);

      // 階層モーダル
      $('btnAddNodeLandscape').addEventListener('click', () => openNodeModal());
      $('btnCloseNodeModal').addEventListener('click', () => $('nodeModal').classList.remove('active'));
      $('btnCancelNode').addEventListener('click', () => $('nodeModal').classList.remove('active'));
      $('btnSaveNode').addEventListener('click', saveNode);

      // エクスポートモーダル
      $('btnCloseExportModal').addEventListener('click', () => $('exportModal').classList.remove('active'));
      $('btnCancelExport').addEventListener('click', () => $('exportModal').classList.remove('active'));
      $('btnDownloadZip').addEventListener('click', downloadZip);

      // メタデータ編集モーダル
      $('btnCloseMetaEdit').addEventListener('click', () => $('metaEditModal').classList.remove('active'));
      $('btnCancelMetaEdit').addEventListener('click', () => $('metaEditModal').classList.remove('active'));
      $('btnSaveMetaEdit').addEventListener('click', saveMetaEdit);

      // 設定モーダル
      $('btnCloseSettingsModal').addEventListener('click', () => $('settingsModal').classList.remove('active'));
      $('btnSaveSettings').addEventListener('click', saveSettings);
      $('btnUpdateApp').addEventListener('click', updateApp);
      $('btnResetData').addEventListener('click', resetData);

      // ダークモード即時反映
      $('darkModeToggle').addEventListener('change', () => {
        state.settings.darkMode = $('darkModeToggle').checked;
        applyTheme();
      });

      // Google Drive
      $('btnConnectGoogleDrive').addEventListener('click', connectGoogleDrive);
      $('btnDisconnectGoogleDrive').addEventListener('click', disconnectGoogleDrive);
      $('btnSyncNow').addEventListener('click', syncNowWithFeedback);
      $('btnClearSyncQueue').addEventListener('click', clearSyncQueue);

      // デバイス保存即時反映
      $('downloadToDeviceToggle').addEventListener('change', async () => {
        state.settings.downloadToDevice = $('downloadToDeviceToggle').checked;
        await dbPut('settings', { key: 'downloadToDevice', value: state.settings.downloadToDevice });
      });

      // 撮影
      $('btnCaptureSidebar').addEventListener('click', () => $('fileInput').click());
      $('fileInput').addEventListener('change', (e) => {
        if (e.target.files[0]) {
          handleCapture(e.target.files[0]);
          e.target.value = '';
        }
      });
      $('btnUndoSidebar').addEventListener('click', undoCapture);

      // モーダル外クリックで閉じる
      document.querySelectorAll('.modal-overlay').forEach(overlay => {
        overlay.addEventListener('click', (e) => {
          if (e.target === overlay) {
            overlay.classList.remove('active');
          }
        });
      });
    }

    // 起動
    init();
  </script>
</body>
</html>
